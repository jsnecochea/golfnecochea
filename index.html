<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
body{background:#333;font-family:-apple-system,sans-serif;margin:0;padding:20px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.phone{width:300px;height:620px;background:#0d1117;border-radius:32px;overflow:hidden;border:6px solid #000;position:relative;display:flex;flex-direction:column}
.label{color:#fff;font-size:12px;text-align:center;margin-bottom:8px}
.col{display:flex;flex-direction:column;align-items:center}
/* Simular el home flex */
.home{flex:1;display:flex;flex-direction:column;padding:0 14px;min-height:100%;box-sizing:border-box}
.header{padding:30px 0 14px;display:flex;align-items:center;gap:10px}
.av{width:42px;height:42px;border-radius:50%;background:#185FA5;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
.card{background:#13131f;border:0.5px solid rgba(255,255,255,.07);border-radius:16px;padding:14px;margin-bottom:12px}
.lbl{color:#888;font-size:10px;margin-bottom:8px}
.btns{margin-top:auto;padding:16px 0 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{background:#0F6E56;border-radius:14px;padding:13px;text-align:center;color:#fff;font-weight:700;font-size:13px}
</style></head><body>

<div class="col">
  <div class="label">ANTES (espacio vacío abajo)</div>
  <div class="phone">
    <div style="padding:0 14px">
      <div style="padding:52px 0 14px;display:flex;align-items:center;gap:10px"><div class="av">PA</div><div><div style="color:#e8e8f0;font-size:14px;font-weight:700">Salvador (papá)</div><div style="color:#4a4a6a;font-size:10px">Hcp: —</div></div></div>
      <div class="lbl">SEMANA EN CURSO</div>
      <div class="card" style="height:110px"></div>
      <div class="lbl">ACTIVIDAD</div>
      <div class="card" style="height:70px"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px"><div class="btn">🏌️ Ronda</div><div class="btn">🏋️ Entrenar</div></div>
      <!-- queda hueco abajo -->
    </div>
  </div>
</div>

<div class="col">
  <div class="label">AHORA (llena toda la pantalla)</div>
  <div class="phone">
    <div class="home">
      <div class="header"><div class="av">PA</div><div><div style="color:#e8e8f0;font-size:14px;font-weight:700">Salvador (papá)</div><div style="color:#4a4a6a;font-size:10px">Hcp: —</div></div></div>
      <div class="lbl">SEMANA EN CURSO</div>
      <div class="card" style="height:110px"></div>
      <div class="lbl">ACTIVIDAD</div>
      <div class="card" style="height:70px"></div>
      <div style="display:flex;gap:10px"><div style="flex:1"><div class="lbl" style="text-align:center">Últimas 4</div><div class="card" style="height:90px"></div></div><div style="flex:1"><div class="lbl" style="text-align:center">OP27 25y</div><div class="card" style="height:90px"></div></div></div>
      <div class="btns"><div class="btn">🏌️ Ronda</div><div class="btn">🏋️ Entrenar</div></div>
    </div>
  </div>
</div>

</body></html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Pro final</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; color: #e8e8f0; }
  .phone { width:360px; margin:0 auto; }
  .section-label { color:#888; font-size:11px; font-weight:600; margin:0 0 10px; }
  .card { background:#13131f; border:0.5px solid rgba(255,255,255,.07); border-radius:18px; padding:18px; margin-bottom:14px; }
  .week-dot { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
  .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .lbl{color:#888;font-size:14px;font-weight:600}
  .num{color:#e8e8f0;font-size:30px;font-weight:800;text-align:right;min-width:48px}
  .den{color:#4a4a6a;font-weight:400;font-size:14px;min-width:36px;text-align:left}
</style>
</head>
<body>
<div class="phone">

  <div class="section-label">Semana en curso</div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:18px">
      <svg viewBox="0 0 90 90" width="140" height="140" style="flex-shrink:0">
        <circle cx="45" cy="45" r="37" fill="none" stroke="#1a1a2e" stroke-width="11"/>
        <circle cx="45" cy="45" r="37" fill="none" stroke="#0F6E56" stroke-width="11" stroke-dasharray="232.5" stroke-dashoffset="70" stroke-linecap="round" transform="rotate(-90 45 45)"/>
        <circle cx="45" cy="45" r="24.5" fill="none" stroke="#1a1a2e" stroke-width="11"/>
        <circle cx="45" cy="45" r="24.5" fill="none" stroke="#EF9F27" stroke-width="11" stroke-dasharray="153.9" stroke-dashoffset="38" stroke-linecap="round" transform="rotate(-90 45 45)"/>
        <circle cx="45" cy="45" r="12" fill="none" stroke="#1a1a2e" stroke-width="11"/>
        <circle cx="45" cy="45" r="12" fill="none" stroke="#7F77DD" stroke-width="11" stroke-dasharray="75.4" stroke-dashoffset="19" stroke-linecap="round" transform="rotate(-90 45 45)"/>
      </svg>
      <div style="flex:1;display:flex;flex-direction:column;gap:16px">
        <div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:7px"><div class="dot" style="background:#0F6E56"></div><span class="lbl">Horas</span></div><div style="display:flex;align-items:baseline;justify-content:flex-end"><span class="num">6.5</span><span class="den"> / 10</span></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:7px"><div class="dot" style="background:#EF9F27"></div><span class="lbl">Retos</span></div><div style="display:flex;align-items:baseline;justify-content:flex-end"><span class="num">3</span><span class="den"> / 4</span></div></div>
        <div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:7px"><div class="dot" style="background:#7F77DD"></div><span class="lbl">Rondas</span></div><div style="display:flex;align-items:baseline;justify-content:flex-end"><span class="num">2</span><span class="den"> / 2</span></div></div>
      </div>
    </div>
  </div>

  <div class="section-label">Actividad esta semana</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="week-dot" style="background:#0F6E56;color:#9FE1CB">L</div>
      <div class="week-dot" style="background:#0F6E56;color:#9FE1CB">M</div>
      <div class="week-dot" style="background:#0F6E56;color:#9FE1CB">X</div>
      <div class="week-dot" style="background:#0F6E56;color:#9FE1CB">J</div>
      <div class="week-dot" style="background:#1a1a2e;color:#4a4a6a">V</div>
      <div class="week-dot" style="background:#1a1a2e;color:#4a4a6a">S</div>
      <div class="week-dot" style="background:#1a1a2e;color:#4a4a6a">D</div>
    </div>
    <div style="color:#1D9E75;font-size:11px;font-weight:700;text-align:center;margin-top:14px">4 dias seguidos entrenando</div>
  </div>

  <!-- Seccion dividida: ultimas 3 rondas | OP27 25y -->
  <div style="display:flex;gap:12px">

    <!-- Izquierda: ultimas 3 rondas -->
    <div style="flex:1">
      <div class="section-label" style="text-align:center">Ultimas 4 rondas</div>
      <div class="card" style="margin-bottom:0;padding:16px 12px">
        <div style="display:flex;align-items:flex-end;justify-content:space-around;gap:8px;height:78px;margin-bottom:10px">
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="width:22px;background:#854F0B;border-radius:6px;height:58px"></div>
            <span style="color:#888;font-size:11px;font-weight:700">+12</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="width:22px;background:#534AB7;border-radius:6px;height:44px"></div>
            <span style="color:#888;font-size:11px;font-weight:700">+9</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="width:22px;background:#0F6E56;border-radius:6px;height:30px"></div>
            <span style="color:#888;font-size:11px;font-weight:700">+6</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="width:22px;background:#1D9E75;border-radius:6px;height:16px"></div>
            <span style="color:#9FE1CB;font-size:11px;font-weight:800">+3</span>
          </div>
        </div>
        <div style="text-align:center;border-top:0.5px solid rgba(255,255,255,.07);padding-top:10px">
          <span style="color:#9FE1CB;font-size:11px;font-weight:700">Vas mejorando</span>
        </div>
      </div>
    </div>

    <!-- Derecha: OP27 25y -->
    <div style="flex:1">
      <div class="section-label" style="text-align:center">OP27 · 25 yardas</div>
      <div class="card" style="margin-bottom:0;padding:16px 14px;display:flex;flex-direction:column;gap:12px">
        <div style="background:rgba(239,159,39,.1);border-radius:12px;padding:11px;text-align:center">
          <div style="color:#888;font-size:9px;font-weight:700;letter-spacing:.5px;margin-bottom:4px">ULTIMA</div>
          <div style="color:#EF9F27;font-size:26px;font-weight:800;line-height:1">-2</div>
        </div>
        <div style="background:rgba(29,158,117,.1);border-radius:12px;padding:11px;text-align:center">
          <div style="color:#888;font-size:9px;font-weight:700;letter-spacing:.5px;margin-bottom:4px">MEJOR (30 DIAS)</div>
          <div style="color:#9FE1CB;font-size:26px;font-weight:800;line-height:1">-5</div>
        </div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
